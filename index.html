<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Photography</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

header{
    background:#000;
    color:white;
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:2.5rem;
}

nav{
    background:#111;
    text-align:center;
    padding:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

.hero{
    height:60vh;
    background:url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=1200') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h2{
    font-size:3rem;
    background:rgba(0,0,0,0.5);
    padding:15px;
}

section{
    padding:50px 20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    border-radius:10px;
}

form{
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

form input,
form select,
form textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
}

button{
    background:black;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    width:100%;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<header>
<h1>David Photography</h1>
<p>Capturing Moments That Last Forever</p>
</header>

<nav>
<a href="#gallery">Gallery</a>
<a href="#booking">Book Session</a>
<a href="#contact">Contact</a>
</nav>

<section class="hero">
<h2>Professional Photography Services</h2>
</section>

<section id="gallery">
<h2 style="text-align:center;margin-bottom:20px;">Portfolio</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=600">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=600">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=600">
<img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=600">
</div>
</section>

<section id="booking">
<h2 style="text-align:center;margin-bottom:20px;">Book a Session</h2>

<form id="bookingForm">
<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="package">
<option value="100">Portrait Session - GHS100</option>
<option value="200">Birthday Session - GHS200</option>
<option value="300">Wedding Session - GHS300</option>
<option value="500">Event Coverage - GHS500</option>
</select>

<textarea id="message" placeholder="Additional Details"></textarea>

<button type="button" onclick="payWithPaystack()">
Book & Pay Deposit
</button>
</form>
</section>

<section id="contact">
<h2 style="text-align:center;">Contact</h2>
<p style="text-align:center;margin-top:10px;">
WhatsApp: +233XXXXXXXXX
</p>
</section>

<footer>
<p>© 2026 David Photography. All Rights Reserved.</p>
</footer>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
function payWithPaystack(){

let email = document.getElementById("email").value;
let amount = document.getElementById("package").value;

if(email === ""){
alert("Please enter your email");
return;
}

let handler = PaystackPop.setup({
key: 'YOUR_PAYSTACK_PUBLIC_KEY',
email: email,
amount: amount * 100,
currency: 'GHS',

callback: function(response){
alert('Payment successful. Reference: ' + response.reference);
},

onClose: function(){
alert('Payment window closed');
}
});

handler.openIframe();
}
</script>

</body>
</html>
